apiVersion: ptp.openshift.io/v1
kind: PtpConfig
metadata:
  name: gnrd-bc-tt
  namespace: openshift-ptp
spec:
  profile:
    - name: 00-bc-tt
      ptp4lConf: |
        # ** E825 NAC: [eno8303]-[eno9003]
        # Connected to switch (ethernet1/1/7:4)
        # [eno8303]
        # masterOnly 1
        # Configured as TR slave
        # [eno8403]
        # masterOnly 1
        # Loopback to enp108s0f1 (Onboard ↔ Add-in card 1)
        # [eno8503]
        # masterOnly 1
        # Primary interface (br-ex uplink)
        # [eno8603]
        # masterOnly 1
        [eno8703]
        masterOnly 1
        [eno8803]
        masterOnly 1
        [eno8903]
        masterOnly 1
        [eno9003]
        masterOnly 1
        # ** E830 Carter Flat 1: [enp110s0f0]-[enp110s0f7]
        # Connected to switch (ethernet1/1/8:1)
        # [enp110s0f0]
        # masterOnly 1
        # Loopback to enp108s0f0 (Add-in card 1 ↔ Add-in card 2)
        [enp110s0f1]
        masterOnly 1
        [enp110s0f2]
        masterOnly 1
        [enp110s0f3]
        masterOnly 1
        [enp110s0f4]
        masterOnly 1
        [enp110s0f5]
        masterOnly 1
        [enp110s0f6]
        masterOnly 1
        [enp110s0f7]
        masterOnly 1
        # ** E830 Carter Flat 2: [enp108s0f0]-[enp108s0f7]
        # Loopback to enp110s0f1 (Add-in card 1 ↔ Add-in card 2)
        [enp108s0f0]
        masterOnly 1
        # Loopback to eno8503 (Onboard ↔ Add-in card 1)
        [enp108s0f1]
        masterOnly 1
        [enp108s0f2]
        masterOnly 1
        [enp108s0f3]
        masterOnly 1
        [enp108s0f4]
        masterOnly 1
        [enp108s0f5]
        masterOnly 1
        [enp108s0f6]
        masterOnly 1
        [enp108s0f7]
        masterOnly 1
        [global]
        #
        # Default Data Set
        #
        twoStepFlag 1
        slaveOnly 0
        priority1 128
        priority2 128
        domainNumber 24
        #utc_offset 37
        clockClass 248
        clockAccuracy 0xFE
        offsetScaledLogVariance 0xFFFF
        free_running 0
        freq_est_interval 1
        dscp_event 0
        dscp_general 0
        dataset_comparison G.8275.x
        G.8275.defaultDS.localPriority 128
        #
        # Port Data Set
        #
        logAnnounceInterval -3
        logSyncInterval -4
        logMinDelayReqInterval -4
        logMinPdelayReqInterval -4
        announceReceiptTimeout 3
        syncReceiptTimeout 0
        delayAsymmetry 0
        fault_reset_interval -4
        neighborPropDelayThresh 20000000
        masterOnly 0
        G.8275.portDS.localPriority 128
        #
        # Run time options
        #
        assume_two_step 0
        logging_level 6
        path_trace_enabled 0
        follow_up_info 0
        hybrid_e2e 0
        inhibit_multicast_service 0
        net_sync_monitor 0
        tc_spanning_tree 0
        tx_timestamp_timeout 50
        unicast_listen 0
        unicast_master_table 0
        unicast_req_duration 3600
        use_syslog 1
        verbose 0
        summary_interval 0
        kernel_leap 1
        check_fup_sync 0
        clock_class_threshold 135
        #
        # Servo Options
        #

        # NGEN TEST MODIFIED
        # New:
        # pi_proportional_const 0.60
        # pi_integral_const 0.0003
        # Old:
        # pi_proportional_const 0.0
        # pi_integral_const 0.0
        # END TEST MOD

        pi_proportional_const 0.60
        pi_integral_const 0.001
        pi_proportional_scale 0.0
        pi_proportional_exponent -0.3
        pi_proportional_norm_max 0.7
        pi_integral_scale 0.0
        pi_integral_exponent 0.4
        pi_integral_norm_max 0.3
        step_threshold 2.0
        # end T-BC experiment
        first_step_threshold 0.00002
        max_frequency 900000000
        clock_servo pi
        sanity_freq_limit 200000000
        ntpshm_segment 0
        #
        # Transport options
        #
        transportSpecific 0x0
        ptp_dst_mac 01:1B:19:00:00:00
        p2p_dst_mac 01:80:C2:00:00:0E
        udp_ttl 1
        udp6_scope 0x0E
        uds_address /var/run/ptp4l
        #
        # Default interface options
        #
        clock_type BC
        network_transport L2
        delay_mechanism E2E
        time_stamping hardware
        tsproc_mode filter
        delay_filter moving_median
        delay_filter_length 10
        egressLatency 0
        ingressLatency 0
        boundary_clock_jbod 1
        #
        # Clock description
        #
        productDescription ;;
        revisionData ;;
        manufacturerIdentity 00:00:00
        userDescription ;
        timeSource 0xA0
      ptp4lOpts: -2 --summary_interval -4
      ptpSchedulingPolicy: SCHED_FIFO
      ptpSchedulingPriority: 10
      ptpSettings:
        controllingProfile: 01-bc-tr
        logReduce: "false"
  recommend:
    - match:
        - nodeLabel: node-role.kubernetes.io/master
      priority: 4
      profile: 00-bc-tt
