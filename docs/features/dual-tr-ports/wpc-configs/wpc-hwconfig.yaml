apiVersion: ptp.openshift.io/v2alpha1
kind: HardwareConfig
metadata:
  name: wpc-hwconfig
  namespace: openshift-ptp
spec:
  profile:
    clockChain:
      behavior:
        conditions:
        - desiredStates:
          - ptpPin:
              name: SMA1
              func: Disabled
              chan: 0
              sourceName: PTP
          - ptpPin:
              name: SMA2
              func: TX
              chan: 2
              sourceName: PTP
          - ptpPeriod:
              index: 2
              period:
                sec: 1
                nsec: 0
              sourceName: PTP
          - dpll:
              subsystem: leader
              boardLabel: GNSS-1PPS
              eec:
                priority: 255
              pps:
                priority: 255
          - dpll:
              boardLabel: CVL-SDP20
              eec:
                priority: 255
              pps:
                priority: 255
              subsystem: leader
          - dpll:
              boardLabel: CVL-SDP21
              eec:
                state: disconnected
              pps:
                state: disconnected
              subsystem: leader
          name: Initialize T-BC
          triggers:
          - conditionType: init
            sourceName: PTP
        - desiredStates:
          - dpll:
              subsystem: leader
              boardLabel: CVL-SDP22
              eec:
                priority: 255
              pps:
                priority: 0
          - dpll:
              subsystem: leader
              boardLabel: CVL-SDP23
              eec:
                state: disconnected
              pps:
                state: disconnected
          name: PTP Source Active
          triggers:
          - conditionType: locked
            sourceName: PTP
        - desiredStates:
          - dpll:
              subsystem: leader
              boardLabel: CVL-SDP22
              eec:
                priority: 255
              pps:
                priority: 255
          - dpll:
              subsystem: leader
              boardLabel: CVL-SDP23
              eec:
                state: disconnected
              pps:
                state: connected
          name: PTP Source Lost - Leader Holdover
          triggers:
          - conditionType: lost
            sourceName: PTP
        sources:
        - boardLabel: CVL-SDP22
          name: PTP
          ptpTimeReceivers:
          - ens2f1
          - ens2f3
          sourceType: ptpTimeReceiver
          subsystem: leader
      structure:
      - dpll:
          holdoverParameters:
            maxInSpecOffset: 100
            localMaxHoldoverOffset: 1500
            localHoldoverTimeout: 14400
          networkInterface: ens2f0
          phaseInputs:
            CVL-SDP22:
              description: PTP TR input
              frequency: 1
        ethernet:
        - ports:
          - ens2f0
          - ens2f1
          - ens2f3
        hardwareSpecificDefinitions: intel/e810
        name: leader
    name: wpc-hwconfig
  relatedPtpProfileName: tbc-tr
